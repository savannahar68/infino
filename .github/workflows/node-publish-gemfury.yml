name: Node publish (Gemfury early access)

# Interim early-access publish: builds the prebuilt addon for every supported
# platform and uploads the `infino` package (+ its per-platform binary
# packages) to the Gemfury account `infino`, instead of the public npm registry.
#
# Testers install via Gemfury's smart proxy (blends the Gemfury repo with the
# public npm index, so public deps like apache-arrow still resolve). For a
# PUBLIC Gemfury package no token is needed:
#
#   npm i infino --registry https://npm-proxy.fury.io/infino/
#
# The public-launch path lives in node-publish.yml and is left untouched; at
# launch we publish there (npmjs.org) and testers drop the --registry flag.
#
# Triggered manually. Default run is a dry run (pack + validate, upload nothing).
# A real run needs the secret FURY_PUSH_TOKEN (a Gemfury push token for the
# `infino` account).

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Validate only — pack everything, upload nothing"
        type: boolean
        default: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: ""

jobs:
  build:
    name: Build addon (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      # One native runner per target — no cross-compilation. mac + Linux-gnu
      # only (no Windows/musl), matching the supported-platform decision.
      matrix:
        include:
          - { os: ubuntu-latest, target: linux-x64-gnu }
          - { os: ubuntu-24.04-arm, target: linux-arm64-gnu }
          - { os: macos-13, target: darwin-x64 }
          - { os: macos-14, target: darwin-arm64 }
    steps:
      - uses: actions/checkout@v4
      - name: Free disk space
        if: runner.os == 'Linux'
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: infino-node
      - run: make node-build
      - name: Upload addon
        uses: actions/upload-artifact@v4
        with:
          name: addon-${{ matrix.target }}
          path: infino-node/infino/*.node
          if-no-files-found: error
      - name: Upload JS bindings
        if: matrix.target == 'linux-x64-gnu'
        uses: actions/upload-artifact@v4
        with:
          name: js-bindings
          path: |
            infino-node/infino/native.js
            infino-node/infino/native.d.ts
            infino-node/infino/index.js
            infino-node/infino/index.d.ts
          if-no-files-found: error

  publish:
    name: Upload to Gemfury
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Download platform addons
        uses: actions/download-artifact@v4
        with:
          pattern: addon-*
          path: infino-node/artifacts
          merge-multiple: true
      - name: Download JS bindings
        uses: actions/download-artifact@v4
        with:
          name: js-bindings
          path: infino-node/infino
      - name: Install tooling
        run: cd infino-node && npm install --ignore-scripts
      - name: Generate platform package dirs
        run: cd infino-node && npx napi create-npm-dir -t .
      - name: Stage binaries into platform packages
        run: cd infino-node && npm run artifacts
      # Pack the thin main package + each per-platform package into dist/.
      # The main package's optionalDependencies already pin the per-platform
      # versions (in package.json), so all five tarballs are self-consistent.
      - name: Pack tarballs
        working-directory: infino-node
        run: |
          mkdir -p dist
          npm pack --pack-destination dist
          for d in npm/*/; do npm pack "./$d" --pack-destination dist; done
          echo "Packed:" && ls -1 dist
      # Gemfury uploads a ready package via its push endpoint (not `npm publish`):
      #   curl -F package=@<file> https://<token>@push.fury.io/infino/
      - name: Upload to Gemfury
        if: ${{ !inputs.dry_run }}
        working-directory: infino-node
        env:
          FURY_PUSH_TOKEN: ${{ secrets.FURY_PUSH_TOKEN }}
        run: |
          for f in dist/*.tgz; do
            echo "Uploading $f"
            curl -fsS -F package=@"$f" "https://${FURY_PUSH_TOKEN}@push.fury.io/infino/"
            echo
          done
